name: "Sync digital-marketing-expert (es)"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Auto-mise à jour du workflow
        run: |
          NEW=$(curl -fsSL "https://www.ilaria-academy.com/assets/modules/gencourses/digital-marketing-expert/es/github-workflow.yml" 2>/dev/null || true)
          if [ -n "$NEW" ]; then
            CURRENT=$(cat .github/workflows/github-workflow.yml)
            if [ "$NEW" != "$CURRENT" ]; then
              echo "$NEW" > .github/workflows/github-workflow.yml
              echo "Workflow mis à jour."
            fi
          fi

      - name: Sync depuis RSS
        run: |
          python3 << 'PYEOF'
          import urllib.request, xml.etree.ElementTree as ET, os, re

          RSS_URL   = "https://www.ilaria-academy.com/assets/modules/gencourses/digital-marketing-expert/es/rss-digital-marketing-expert.xml"
          NS        = {'ilaria': 'https://ilaria-academy.com/rss/ns'}
          TYPES     = ('workshop', 'mini-project')
          SEE_LABEL       = "Ver el taller completo"
          WORKSHOPS_LABEL = "Talleres"

          with urllib.request.urlopen(RSS_URL) as r:
              tree = ET.parse(r)
          channel = tree.find('channel')

          # README.md racine
          course_title = channel.findtext('title', '').strip()
          course_desc  = channel.findtext('description', '').strip()
          course_link  = channel.findtext('link', '').strip()
          items = [i for i in channel.findall('item') if (i.find('ilaria:chapterType', NS) is not None and i.find('ilaria:chapterType', NS).text in TYPES)]
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(f'# {course_title}\n\n')
              if course_desc:
                  f.write(f'{course_desc}\n\n')
              if course_link:
                  f.write(f'[{SEE_LABEL}]({course_link})\n\n')
              if items:
                  f.write(f'## {WORKSHOPS_LABEL}\n\n')
                  for i, item in enumerate(items, 1):
                      t = item.findtext('title', '').strip()
                      s = re.sub(r'[^a-z0-9]+', '-', t.lower()).strip('-') or 'chapitre'
                      f.write(f'- [{i:02d}. {t}]({i:02d}-{s}/)\n')

          # Dossiers par atelier directement à la racine
          idx = 1
          for item in channel.findall('item'):
              ct = item.find('ilaria:chapterType', NS)
              if ct is None or ct.text not in TYPES:
                  continue
              title = item.findtext('title', '').strip()
              link  = item.findtext('link', '').strip()
              desc  = item.findtext('description', '').strip()
              slug  = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-') or 'chapitre'
              folder  = f'{idx:02d}-{slug}'
              starter = f'{folder}/starter'
              os.makedirs(starter, exist_ok=True)

              readme_path = f'{folder}/README.md'
              if not os.path.exists(readme_path):
                  with open(readme_path, 'w', encoding='utf-8') as f:
                      f.write(f'# {title}\n\n')
                      if desc:
                          f.write(f'{desc}\n\n')
                      f.write(f'[{SEE_LABEL}]({link})\n')

              stubs = {
                  'index.html': f'<!-- {title} -->\n',
                  'style.css':  f'/* {title} */\n',
                  'script.js':  f'// {title}\n',
                  'main.py':    f'# {title}\n',
                  'index.php':  f'<?php\n// {title}\n',
              }
              for fname, header in stubs.items():
                  stub_path = f'{starter}/{fname}'
                  if not os.path.exists(stub_path):
                      with open(stub_path, 'w', encoding='utf-8') as f:
                          f.write(header)
              idx += 1

          # _config.yml pour GitHub Pages (thème Slate)
          with open('_config.yml', 'w', encoding='utf-8') as f:
              desc160 = course_desc[:160] if course_desc else course_title
              f.write('theme: jekyll-theme-slate\n')
              f.write(f'title: "{course_title}"\n')
              f.write(f'description: "{desc160}"\n')
              if course_link:
                  f.write(f'url: "{course_link}"\n')
              f.write('show_downloads: false\n')

          # index.md pour GitHub Pages
          with open('index.md', 'w', encoding='utf-8') as f:
              desc160 = course_desc[:160] if course_desc else ''
              f.write('---\n')
              f.write('layout: default\n')
              f.write(f'title: "{course_title}"\n')
              if desc160:
                  f.write(f'description: "{desc160}"\n')
              f.write('---\n\n')
              f.write(f'# {course_title}\n\n')
              if course_desc:
                  f.write(f'{course_desc}\n\n')
              if course_link:
                  f.write(f'[{SEE_LABEL}]({course_link})\n\n')
              if items:
                  f.write(f'## {WORKSHOPS_LABEL}\n\n')
                  for i, item in enumerate(items, 1):
                      t  = item.findtext('title', '').strip()
                      lk = item.findtext('link', '').strip()
                      f.write(f'{i:02d}. [{t}]({lk})\n')
                  f.write('\n')

          # CITATION.cff
          import datetime
          year = datetime.date.today().year
          with open('CITATION.cff', 'w', encoding='utf-8') as f:
              f.write('cff-version: 1.2.0\n')
              f.write('message: "Si utiliza estos recursos, por favor cite la fuente."\n')
              f.write('authors:\n  - name: "Ilaria Digital School"\n')
              f.write(f'title: "{course_title}"\n')
              f.write(f'url: "{course_link}"\n')
              f.write(f'year: {year}\n')
              f.write('license: LicenseRef-proprietary\n')

          # LICENSE
          with open('LICENSE', 'w', encoding='utf-8') as f:
              f.write(f'Copyright (c) {year} Ilaria Digital School. All rights reserved.\n\n')
              f.write('Estos recursos son propiedad exclusiva de Ilaria Digital School.\n')
              f.write('Cualquier reproduccion, distribucion o transmision, bajo cualquier forma\n')
              f.write('que sea, esta estrictamente prohibida sin autorizacion escrita previa.\n\n')
              f.write('Contact : rss@ilariaacademy.net\n')
          PYEOF

      - name: Commit et push
        run: |
          git config user.name "Ilaria Digital School"
          git config user.email "rss@ilariaacademy.net"
          git add -A
          git diff --cached --quiet || git commit -m "sync: actualizacion desde RSS"
          git push
